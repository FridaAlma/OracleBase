<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle - Chatbot AI</title>
<style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

    :root {
        --bg-primary: #0d1117;
        --bg-secondary: #161b22;
        --bg-tertiary: #21262d;
        --bg-hover: #30363d;
        --border: #30363d;
        --text-primary: #e6edf3;
        --text-secondary: #8b949e;
        --text-muted: #6e7681;
        --accent: #58a6ff;
        --accent-hover: #79c0ff;
        --success: #3fb950;
        --warning: #d29922;
        --danger: #f85149;
        --user-msg-bg: #1f6feb22;
        --assistant-msg-bg: #161b22;
        --scrollbar-thumb: #30363d;
        --scrollbar-track: #0d1117;
        --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    body {
        background: var(--bg-primary);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--bg-hover); }

    /* ── Header ── */

    .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 999;
        position: absolute;
        left: 0;
        padding: 10px;
    }

    .logo {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--accent), #a371f7);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 16px;
        color: white;
    }

    .header-title h1 {
        font-size: 18px;
        font-weight: 600;
    }

    .header-title span {
        font-size: 12px;
        color: var(--text-secondary);
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 999;
        position: absolute;
        right: 0;
        padding: 10px;
    }

    .status-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text-secondary);
    }

    /* ── Model Badge ── */
    .model-badge {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--bg-tertiary);
        cursor: default;
        transition: all 0.3s;
        user-select: none;
        white-space: nowrap;
    }

    .model-badge.pro {
        border-color: #a371f7;
        background: #a371f711;
        color: #c9a9ff;
    }

    .model-badge.flash {
        border-color: var(--accent);
        background: #58a6ff11;
        color: var(--accent);
    }

    .model-badge.auto {
        border-color: var(--success);
        background: #3fb95011;
        color: var(--success);
    }

    .model-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        display: inline-block;
    }

    .model-badge.pro .model-dot { background: #a371f7; }
    .model-badge.flash .model-dot { background: var(--accent); }
    .model-badge.auto .model-dot { background: var(--success); }

    .btn-model-toggle {
        font-size: 14px;
    }

    .btn-model-toggle.active {
        border-color: #a371f7;
        color: #c9a9ff;
        background: #a371f711;
    }

    .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success);
        animation: pulse 2s infinite;
    }

    .status-dot.disconnected {
        background: var(--danger);
        animation: none;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }

    .btn-icon {
        background: none;
        border: 1px solid var(--border);
        color: var(--text-secondary);
        width: 36px;
        height: 36px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.2s;
    }

    .btn-icon:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
        border-color: var(--text-muted);
    }

    /* ── Main Chat Area ── */
    .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 0;
        display: flex;
        flex-direction: column;
    }

    .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        max-width: 900px;
        width: 100%;
        margin: 0 auto;
    }

    .messages:empty::after {
        content: 'Chiedimi qualcosa per iniziare...';
        display: block;
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
        margin-top: 80px;
        font-style: italic;
    }

    /* ── Message Bubbles ── */
    .message {
        display: flex;
        gap: 12px;
        max-width: 85%;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
        align-self: flex-end;
        flex-direction: row-reverse;
    }

    .message.assistant {
        align-self: flex-start;
    }

    .message.error {
        align-self: flex-start;
    }

    .message.error .msg-content {
        background: #f8514911;
        border: 1px solid #f8514933;
        color: var(--danger);
    }

    .msg-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 600;
    }

    .message.user .msg-avatar {
        background: var(--accent);
        color: white;
    }

    .message.assistant .msg-avatar {
        background: linear-gradient(135deg, var(--accent), #a371f7);
        color: white;
    }

    .message.error .msg-avatar {
        background: var(--danger);
        color: white;
    }

    .msg-body {
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 100%;
    }

    .msg-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .message.user .msg-label {
        text-align: right;
    }

    .msg-content {
        padding: 12px 16px;
        border-radius: 12px;
        line-height: 1.6;
        font-size: 14px;
        word-wrap: break-word;
        overflow-wrap: break-word;
    }

    .message.user .msg-content {
        background: var(--user-msg-bg);
        border: 1px solid #1f6feb44;
        border-bottom-right-radius: 4px;
    }

    .message.assistant .msg-content {
        background: var(--assistant-msg-bg);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
        position: relative;
    }

    .copy-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s, color 0.2s, border-color 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        line-height: 0;
        z-index: 2;
    }

    .message.assistant .msg-content:hover .copy-btn {
        opacity: 1;
    }

    .copy-btn:hover {
        color: var(--text-primary);
        background: var(--bg-hover);
    }

    .copy-btn.copied {
        color: var(--success);
        border-color: var(--success);
    }

    /* ── Markdown dentro i messaggi ── */
    .msg-content p { margin-bottom: 8px; }
    .msg-content p:last-child { margin-bottom: 0; }
    .msg-content ul, .msg-content ol { padding-left: 20px; margin-bottom: 8px; }
    .msg-content li { margin-bottom: 4px; }
    .msg-content h1, .msg-content h2, .msg-content h3, .msg-content h4 {
        margin-top: 16px;
        margin-bottom: 8px;
        font-weight: 600;
    }
    .msg-content h1 { font-size: 20px; }
    .msg-content h2 { font-size: 18px; }
    .msg-content h3 { font-size: 16px; }
    .msg-content a { color: var(--accent); text-decoration: none; }
    .msg-content a:hover { text-decoration: underline; }
    .msg-content strong { font-weight: 600; }
    .msg-content code {
        background: var(--bg-tertiary);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: var(--font-mono);
        font-size: 13px;
    }
    .msg-content pre {
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        margin: 8px 0;
        overflow-x: auto;
        position: relative;
    }
    .msg-content pre code {
        background: none;
        padding: 0;
        border-radius: 0;
        font-size: 13px;
        line-height: 1.5;
    }
    .msg-content blockquote {
        border-left: 3px solid var(--accent);
        padding-left: 12px;
        color: var(--text-secondary);
        margin: 8px 0;
    }
    .msg-content table {
        border-collapse: collapse;
        margin: 8px 0;
        width: 100%;
        font-size: 13px;
    }
    .msg-content th, .msg-content td {
        border: 1px solid var(--border);
        padding: 6px 12px;
        text-align: left;
    }
    .msg-content th {
        background: var(--bg-tertiary);
        font-weight: 600;
    }
    .msg-content hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 12px 0;
    }

    /* ── Image Card Preview (Discord/WhatsApp style) ── */
    .img-card {
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        margin: 8px 0;
        background: var(--bg-tertiary);
        max-width: 500px;
        transition: border-color 0.2s;
    }
    .img-card:hover {
        border-color: var(--text-muted);
    }
    .img-card-img {
        width: 100%;
        max-height: 360px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #00000055;
        cursor: pointer;
    }
    .img-card-img img {
        width: 100%;
        height: auto;
        display: block;
        transition: transform 0.2s;
    }
    .img-card-img img:hover {
        transform: scale(1.02);
    }
    .img-card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 12px;
        font-size: 11px;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
    }
    .img-card-domain {
        font-weight: 600;
        text-transform: lowercase;
    }

    /* ── Tool Activity Panel ── */
    .tool-activity {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin: 8px 0;
        padding: 0;
        animation: fadeIn 0.3s ease;
    }

    .tool-activity-header {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 2px 0 4px 0;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .tool-activity-header::before {
        content: '🔧';
        font-size: 12px;
    }

    .tool-call {
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .tool-call::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--warning);
        border-radius: 3px 0 0 3px;
    }

    .tool-call.done {
        border-color: #3fb95033;
    }

    .tool-call.done::before {
        background: var(--success);
    }

    .tool-call.error {
        border-color: #f8514933;
    }

    .tool-call.error::before {
        background: var(--danger);
    }

    .tool-call-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .tool-call-icon {
        width: 24px;
        height: 24px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        flex-shrink: 0;
        background: #d2992222;
        color: var(--warning);
    }

    .tool-call.done .tool-call-icon {
        background: #3fb95022;
        color: var(--success);
    }

    .tool-call.error .tool-call-icon {
        background: #f8514922;
        color: var(--danger);
    }

    .tool-call-name {
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
    }

    .tool-call-status {
        font-size: 11px;
        display: flex;
        align-items: center;
        gap: 4px;
        margin-left: auto;
        flex-shrink: 0;
    }

    .tool-call-spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--warning);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: inline-block;
    }

    .tool-call.done .tool-call-spinner {
        display: none;
    }

    .tool-call-status-text {
        color: var(--text-muted);
    }

    .tool-call.done .tool-call-status-text {
        color: var(--success);
    }

    .tool-call.error .tool-call-status-text {
        color: var(--danger);
    }

    .tool-call-args {
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid var(--border);
    }

    .tool-call-args summary {
        font-size: 11px;
        color: var(--text-muted);
        cursor: pointer;
        user-select: none;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 0;
    }

    .tool-call-args summary:hover {
        color: var(--text-secondary);
    }

    .tool-call-args summary::before {
        content: '▶';
        font-size: 9px;
        transition: transform 0.2s;
    }

    .tool-call-args[open] summary::before {
        transform: rotate(90deg);
    }

    .tool-call-args-content {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-secondary);
        background: var(--bg-primary);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 8px 10px;
        margin-top: 4px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        line-height: 1.4;
        max-height: 200px;
        overflow-y: auto;
    }

    .tool-call-result {
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid var(--border);
        display: none;
    }

    .tool-call.done .tool-call-result {
        display: block;
    }

    .tool-call-result summary {
        font-size: 11px;
        color: var(--text-muted);
        cursor: pointer;
        user-select: none;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 0;
    }

    .tool-call-result summary:hover {
        color: var(--text-secondary);
    }

    .tool-call-result summary::before {
        content: '▶';
        font-size: 9px;
        transition: transform 0.2s;
    }

    .tool-call-result[open] summary::before {
        transform: rotate(90deg);
    }

    .tool-call-result-content {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-secondary);
        background: var(--bg-primary);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 8px 10px;
        margin-top: 4px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        line-height: 1.4;
        max-height: 200px;
        overflow-y: auto;
    }

    .tool-call-result-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        margin-bottom: 2px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(210, 153, 34, 0.1); }
        50% { box-shadow: 0 0 0 4px rgba(210, 153, 34, 0.2); }
    }

    .tool-call:not(.done):not(.error) {
        animation: pulse-glow 1.5s ease-in-out infinite;
    }

    /* ── Streaming Cursor ── */
    .streaming-cursor::after {
        content: '▊';
        animation: blink 1s step-end infinite;
        color: var(--accent);
        margin-left: 2px;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }

    /* ── Input Area ── */
    .input-area {
        padding-bottom: 10px;
        flex-shrink: 0;
    }

    .input-wrapper {
        max-width: 900px;
        margin: 0 auto;
        display: flex;
        gap: 8px;
        align-items: flex-end;
    }

    .input-field {
        flex: 1;
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 16px;
        color: var(--text-primary);
        font-size: 14px;
        font-family: inherit;
        outline: none;
        resize: none;
        min-height: 48px;
        max-height: 200px;
        line-height: 1.5;
        transition: border-color 0.2s;
    }

    .input-field:focus {
        border-color: var(--accent);
    }

    .input-field::placeholder {
        color: var(--text-muted);
    }

    .send-btn {
        background: var(--accent);
        border: none;
        color: white;
        width: 48px;
        height: 48px;
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        transition: all 0.2s;
        flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
        background: var(--accent-hover);
        transform: scale(1.05);
    }

    .send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    .send-btn.stop {
        background: var(--danger);
    }

    .send-btn.stop:hover {
        background: #ff6b62;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 12px 16px;
        align-items: center;
    }

    .typing-indicator span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-muted);
        animation: typing 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Activity Log inside assistant messages ── */
    .msg-log-content {
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1.6;
        background: #00000044;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 8px;
        margin-top: 4px;
        max-height: 260px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
    }

    .log-entry-start { color: var(--warning); }
    .log-entry-done  { color: var(--success); }
    .log-entry-error { color: var(--danger); }
    .log-entry-info  { color: var(--text-secondary); }

    /* ── Tool Activity Panel ── */
    .tool-activity {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin: 4px 0;
        padding: 8px 12px;
        max-width: 85%;
        align-self: flex-start;
        font-size: 13px;
    }
    .tool-activity-header {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
    }
    .tool-call {
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
        transition: opacity 0.3s;
    }
    .tool-call:last-child {
        border-bottom: none;
        padding-bottom: 0;
    }
    .tool-call.done {
        opacity: 0.85;
    }
    .tool-call.error {
        background: #f8514911;
        border-radius: 4px;
        padding: 6px;
        margin: 2px -4px;
    }
    .tool-call-row {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .tool-call-icon {
        font-size: 14px;
        flex-shrink: 0;
        width: 20px;
        text-align: center;
    }
    .tool-call-name {
        font-weight: 600;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--accent);
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .tool-call-status {
        font-size: 11px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
    }
    .tool-call.done .tool-call-status {

<body>

<!-- ── Header ── -->
<div class="header-left">
    <div class="logo">O</div>
    <div class="header-title">
        <h1>Oracle</h1>
        <span>AI Coding Agent</span>
    </div>
</div>
<div class="header-right">
    <div class="model-badge" id="modelBadge" title="Modello attivo">
        <span class="model-dot" id="modelDot"></span>
        <span id="modelName">Flash</span>
    </div>
    <button class="btn-icon btn-model-toggle" id="modelToggleBtn" title="Toggle modello (auto/flash/pro)">⚡</button>
    <div class="status-indicator">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connesso</span>
    </div>
    <button class="btn-icon" id="clearBtn" title="Nuova conversazione">↺</button>

</div>

<!-- ── Chat Messages ── -->
<div class="chat-container">
    <div class="messages" id="messages"></div>
</div>

<!-- ── Input Area ── -->
<div class="input-area">
    <div class="input-wrapper">
        <textarea class="input-field" id="inputField" rows="1" placeholder="Scrivi un messaggio..." autofocus></textarea>
        <button class="send-btn" id="sendBtn" title="Invia (Invio)">➤</button>
    </div>
</div>

<!-- ── Constitution Modal ── -->
<div class="modal-overlay" id="constitutionOverlay" style="display:none;">
    <div class="modal constitution-modal">
        <div class="modal-header">
            <h2>⚖️ Costituzione di Oracle</h2>
            <button class="modal-close" id="constitutionClose">&times;</button>
        </div>
        <div class="modal-body">
            <div class="constitution-articles" id="constitutionArticles">
                <div class="loading">Caricamento articoli...</div>
            </div>
            <div class="constitution-section">
                <h3>📦 Tool in attesa di approvazione</h3>
                <div id="pendingToolsList">
                    <div class="loading">Caricamento tool pending...</div>
                </div>
            </div>
            <div class="constitution-section">
                <h3>✅ Tool approvati</h3>
                <div id="approvedToolsList">
                    <div class="loading">Caricamento...</div>
                </div>
            </div>
            <div class="constitution-section">
                <h3>⏳ Conferme in sospeso</h3>
                <div id="pendingConfirmationsList">
                    <div class="loading">Caricamento...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ── DOM refs ──
    const messagesEl = document.getElementById('messages');
    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const modelBadge = document.getElementById('modelBadge');
    const modelName = document.getElementById('modelName');
    const modelDot = document.getElementById('modelDot');
    const modelToggleBtn = document.getElementById('modelToggleBtn');

    // ── Copy button SVG ──
    const COPY_BTN_HTML = '<button class="copy-btn" onclick="copyMessage(this)" title="Copia messaggio">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>' +
        '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>' +
        '</svg></button>';

    // ── State ──
    let sessionId = null;
    let isStreaming = false;
    let abortController = null;
    let modelTier = 'auto';  // auto | flash | pro


    // ── Auto-resize textarea ──
    inputField.addEventListener('input', () => {
        inputField.style.height = 'auto';
        inputField.style.height = Math.min(inputField.scrollHeight, 200) + 'px';
    });

    // ── Simple Markdown Renderer ──
    // ── Convert bare image URLs to card-ready markdown ──
    function wrapImageUrls(text) {
        // Match URLs ending in image extensions, standalone (not inside markdown link/parens)
        return text.replace(/(?<![(\[])(https?:\/\/[^\s<]+?\.(?:jpe?g|png|gif|webp|bmp|svg)(?:\?[^\s<]*)?)/gi,
            (url) => `![🖼️](${url})`
        );
    }

    function renderMarkdown(text) {
        if (!text) return '';

        // Convert bare image URLs to markdown image syntax first
        text = wrapImageUrls(text);

        // Preserve raw img tags before HTML escaping
        const imgTags = [];
        let html = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, src) => {
            const idx = imgTags.length;
            imgTags.push(`<div class="img-card"><div class="img-card-img"><img src="${src}" alt="${alt}" loading="lazy" onclick="window.open('${src}','_blank')"></div><div class="img-card-footer"><span class="img-card-domain">${new URL(src).hostname}</span><span class="img-card-size">🖼️</span></div></div>`);
            return `\x00IMG${idx}\x00`;
        });

        // Escape HTML
        html = html
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');

        // Restore img tags
        html = html.replace(/\x00IMG(\d+)\x00/g, (_, idx) => imgTags[parseInt(idx)]);

        // Code blocks (```)
        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
            const langClass = lang ? ` class="language-${lang}"` : '';
            return `<pre><code${langClass}>${code.trim()}</code></pre>`;
        });

        // Inline code
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

        // Headers
        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

        // Bold and italic
        html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

        // Strikethrough
        html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

        // Links
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

        // Horizontal rules
        html = html.replace(/^---$/gm, '<hr>');

        // Blockquotes
        html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

        // Unordered lists
        html = html.replace(/^[\s]*[-*+] (.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

        // Ordered lists
        html = html.replace(/^[\s]*\d+\. (.+)$/gm, '<li>$1</li>');

        // Line breaks -> paragraphs
        const paragraphs = html.split(/\n\n+/);
        html = paragraphs.map(p => {
            p = p.trim();
            if (!p) return '';
            if (p.startsWith('<h') || p.startsWith('<pre') || p.startsWith('<ul') || p.startsWith('<ol') || p.startsWith('<blockquote') || p.startsWith('<hr') || p.startsWith('<img') || p.startsWith('<div')) {
                return p;
            }
            // Convert single line breaks within paragraphs
            p = p.replace(/\n/g, '<br>');
            return `<p>${p}</p>`;
        }).join('\n');

        // Fix nested paragraphs in list items
        html = html.replace(/<li><p>/g, '<li>');
        html = html.replace(/<\/p><\/li>/g, '</li>');

        return html;
    }

    // ── Add message to the DOM ──
    function addMessage(role, content, isStreaming_ = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        if (isStreaming_) {
            msgDiv.classList.add('streaming');
        }

        const avatarLabel = role === 'user' ? 'U' : role === 'error' ? '!' : 'O';
        const labelText = role === 'user' ? 'Tu' : role === 'error' ? 'Errore' : 'Oracle';

        const isUser = role === 'user';
        let contentHtml;
        if (isUser) {
            contentHtml = escapeHtml(content);
        } else {
            contentHtml = '<div class="msg-text">' + renderMarkdown(content) + '</div>' + COPY_BTN_HTML;
        }

        msgDiv.innerHTML = `
            <div class="msg-avatar">${avatarLabel}</div>
            <div class="msg-body">
                <div class="msg-label">${labelText}</div>
                <div class="msg-content">${contentHtml}</div>
                ${isUser ? '' : '<div class="msg-log" style="display:none"><div class="msg-log-header">📋 Attività in background</div><div class="msg-log-content"></div></div>'}
            </div>
        `;

        messagesEl.appendChild(msgDiv);
        scrollToBottom();
        return msgDiv;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ── Update streaming message ──
    function updateStreamingMessage(content) {
        let lastMsg = messagesEl.querySelector('.message.streaming');
        if (!lastMsg) {
            lastMsg = addMessage('assistant', '', true);
        }
        const contentEl = lastMsg.querySelector('.msg-content');
        if (contentEl) {
            const msgText = contentEl.querySelector('.msg-text');
            if (msgText) {
                msgText.innerHTML = renderMarkdown(content) + '<span class="streaming-cursor"></span>';
            } else {
                contentEl.innerHTML = renderMarkdown(content) + '<span class="streaming-cursor"></span>';
            }
        }
        scrollToBottom();
        return lastMsg;
    }

    // ── Finalize streaming message ──
    function finalizeStreamingMessage(content) {
        let lastMsg = messagesEl.querySelector('.message.streaming');
        if (!lastMsg) {
            lastMsg = addMessage('assistant', content);
            return lastMsg;
        }
        const contentEl = lastMsg.querySelector('.msg-content');
        if (contentEl) {
            const msgText = contentEl.querySelector('.msg-text');
            if (msgText) {
                msgText.innerHTML = renderMarkdown(content);
            } else {
                contentEl.innerHTML = renderMarkdown(content);
            }
        }
        lastMsg.classList.remove('streaming');
        scrollToBottom();
        return lastMsg;
    }

    // ── Tool Activity Panel ──
    let toolActivityContainer = null;

    function ensureToolActivityContainer() {
        if (!toolActivityContainer || !document.body.contains(toolActivityContainer)) {
            toolActivityContainer = document.createElement('div');
            toolActivityContainer.className = 'tool-activity';
            toolActivityContainer.innerHTML = '<div class="tool-activity-header">Attività dei tool</div>';
            // Inserisci prima dell'ultimo messaggio o alla fine
            const lastMsg = messagesEl.querySelector('.message:last-child');
            if (lastMsg) {
                messagesEl.insertBefore(toolActivityContainer, lastMsg.nextSibling);
            } else {
                messagesEl.appendChild(toolActivityContainer);
            }
        }
        return toolActivityContainer;
    }

    function createToolCallElement(toolName, toolArgs) {
        const container = ensureToolActivityContainer();
        const el = document.createElement('div');
        el.className = 'tool-call';
        el.dataset.toolName = toolName;

        // Icona appropriata per il tool
        let icon = '🔧';
        const iconMap = {
            'read_file': '📖', 'read': '📖',
            'write_file': '✏️', 'write': '✏️',
            'edit_file': '📝', 'edit': '📝',
            'run_shell': '💻', 'run_command': '💻', 'shell': '💻',
            'grep': '🔍', 'find': '🔎', 'search': '🔎',
            'search_content': '🔎', 'search_file': '🔎',
            'ls': '📂', 'list_files': '📂', 'list': '📂',
            'web_access': '🌐', 'web_request': '🌐',
            'wiki_tool': '📚', 'wiki': '📚',
            'vector_memory': '🧠', 'vector': '🧠',
            'task': '🤖', 'subtask': '🤖',
        };
        icon = iconMap[toolName] || '🔧';

        const hasArgs = toolArgs && toolArgs.length > 0;

        el.innerHTML = `
            <div class="tool-call-row">
                <div class="tool-call-icon">${icon}</div>
                <span class="tool-call-name">${escapeHtml(toolName)}</span>
                <span class="tool-call-status">
                    <span class="tool-call-spinner"></span>
                    <span class="tool-call-status-text">In esecuzione...</span>
                </span>
            </div>
            ${hasArgs ? `
            <details class="tool-call-args">
                <summary>Argomenti</summary>
                <div class="tool-call-args-content">${escapeHtml(toolArgs)}</div>
            </details>` : ''}
            <details class="tool-call-result">
                <summary><span class="tool-call-result-label">Risultato</span></summary>
                <div class="tool-call-result-content"></div>
            </details>
        `;

        container.appendChild(el);
        scrollToBottom();
        return el;
    }

    function updateToolCallDone(toolEl, result) {
        if (!toolEl) return;
        toolEl.classList.add('done');

        // Aggiorna status
        const statusText = toolEl.querySelector('.tool-call-status-text');
        if (statusText) {
            statusText.textContent = result ? 'Completato' : '✓ Fatto';
        }

        // Mostra risultato se presente
        if (result) {
            const resultDetails = toolEl.querySelector('.tool-call-result');
            const resultContent = toolEl.querySelector('.tool-call-result-content');
            if (resultContent) {
                resultContent.textContent = result;
            }
            if (resultDetails) {
                resultDetails.style.display = 'block';
            }
        }

        scrollToBottom();
    }

    function updateToolCallError(toolEl, errorMsg) {
        if (!toolEl) return;
        toolEl.classList.add('error');

        const statusText = toolEl.querySelector('.tool-call-status-text');
        if (statusText) {
            statusText.textContent = errorMsg ? `Errore: ${errorMsg}` : 'Errore';
        }

        const spinner = toolEl.querySelector('.tool-call-spinner');
        if (spinner) {
            spinner.style.display = 'none';
        }

        scrollToBottom();
    }

    // ── Copy message to clipboard ──
    function copyMessage(btn) {
        const msgText = btn.closest('.msg-content').querySelector('.msg-text');
        const text = msgText.innerText;
        navigator.clipboard.writeText(text).then(() => {
            const original = btn.innerHTML;
            btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerHTML = original;
                btn.classList.remove('copied');
            }, 2000);
        }).catch(function() {});
    }

    // ── Activity Log inside assistant messages ──
    function ensureStreamingMsg() {
        let msgEl = messagesEl.querySelector('.message.streaming');
        if (!msgEl && isStreaming) {
            msgEl = addMessage('assistant', '', true);
        }
        return msgEl;
    }

    function appendLogEntry(text, type) {
        // type: 'start', 'done', 'error', 'info'
        const msgEl = ensureStreamingMsg();
        if (!msgEl) return;

        const logEl = msgEl.querySelector('.msg-log');
        const logContent = msgEl.querySelector('.msg-log-content');
        if (!logEl || !logContent) return;

        // Rendi visibile al primo log entry
        logEl.style.display = '';

        const entry = document.createElement('div');
        entry.className = 'log-entry-' + type;
        entry.textContent = text;
        logContent.appendChild(entry);
        logContent.scrollTop = logContent.scrollHeight;
        scrollToBottom();
    }

    // ── Add error message ──
    function addErrorMessage(content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message error';
        msgDiv.innerHTML = `
            <div class="msg-avatar">!</div>
            <div class="msg-body">
                <div class="msg-label">Errore</div>
                <div class="msg-content">${escapeHtml(content)}</div>
            </div>
        `;
        messagesEl.appendChild(msgDiv);
        scrollToBottom();
    }

    // ── Typing indicator ──
    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message assistant typing-msg';
        div.id = 'typingIndicator';
        div.innerHTML = `
            <div class="msg-avatar">O</div>
            <div class="msg-body">
                <div class="msg-label">Oracle</div>
                <div class="msg-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        `;
        messagesEl.appendChild(div);
        scrollToBottom();
    }

    function hideTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    // ── Scroll to bottom ──
    function scrollToBottom() {
        const container = messagesEl.parentElement;
        requestAnimationFrame(() => {
            container.scrollTop = container.scrollHeight;
        });
    }

    // ── Set connection status ──
    function setConnected(connected) {
        statusDot.className = `status-dot${connected ? '' : ' disconnected'}`;
        statusText.textContent = connected ? 'Connesso' : 'Disconnesso';
    }

    // ── Update model badge ──
    function updateModelBadge(info) {
        const tier = info.tier || 'flash';
        const name = info.model_name || 'DeepSeek V4 Flash';
        modelBadge.className = `model-badge ${tier}`;
        modelName.textContent = tier === 'pro' ? 'Pro' : tier === 'flash' ? 'Flash' : 'Auto';
        modelBadge.title = `${name} · ${info.params_active || ''} params attivi`;
        // Se il tier_mode è 'auto', mostriamo 'Auto' anche se internamente ha scelto pro/flash
        if (info.tier_mode === 'auto') {
            modelBadge.className = 'model-badge auto';
            modelName.textContent = 'Auto';
            modelBadge.title = `Auto-detect · ora usando: ${name}`;
        }
    }

    // ── Toggle model tier ──
    function cycleModelTier() {
        const cycle = { 'auto': 'pro', 'pro': 'flash', 'flash': 'auto' };
        modelTier = cycle[modelTier] || 'auto';
        const labels = { 'auto': 'Auto', 'pro': 'Pro', 'flash': 'Flash' };
        modelBadge.className = `model-badge ${modelTier}`;
        modelName.textContent = labels[modelTier];
        modelBadge.title = `Modello forzato: ${labels[modelTier]}`;
        modelToggleBtn.classList.toggle('active', modelTier !== 'auto');
        addSystemMessage(`Modello commutato a: ${labels[modelTier]}${modelTier === 'auto' ? ' (rilevamento automatico)' : ' (forzato)'}`);
    }

    // ── Add system message (for model toggle feedback) ──
    function addSystemMessage(text) {
        const div = document.createElement('div');
        div.className = 'message system';
        div.innerHTML = `<div class="msg-body"><div class="msg-content" style="text-align:center;font-style:italic;color:var(--text-muted);font-size:12px;background:none;border:none;padding:4px 16px;">${text}</div></div>`;
        messagesEl.appendChild(div);
        scrollToBottom();
    }

    // ── Send message ──
    async function sendMessage() {
        const message = inputField.value.trim();
        if (!message || isStreaming) return;

        inputField.value = '';
        inputField.style.height = 'auto';
        addMessage('user', message);

        isStreaming = true;
        sendBtn.innerHTML = '■';
        sendBtn.classList.add('stop');
        sendBtn.title = 'Interrompi (Esc)';
        sendBtn.disabled = false;

        showTyping();

        abortController = new AbortController();

        let accumulatedContent = '';
        let toolCallMap = {};  // tool_name → DOM element (supporta tool paralleli)

        // Resetta il container tool per una nuova conversazione
        toolActivityContainer = null;

        try {
            const params = new URLSearchParams({ message });
            if (sessionId) {
                params.set('session_id', sessionId);
            }
            if (modelTier && modelTier !== 'auto') {
                params.set('model_tier', modelTier);
            }

            const response = await fetch(`/api/chat/stream?${params.toString()}`, {
                signal: abortController.signal,
                headers: { 'Accept': 'text/event-stream' },
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`Errore HTTP ${response.status}: ${errText}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const data = line.slice(6).trim();

                    if (data === '[DONE]') continue;

                    try {
                        const parsed = JSON.parse(data);
                        const { type, data: payload } = parsed;

                        switch (type) {
                            case 'model': {
                                if (typeof payload === 'object') {
                                    updateModelBadge(payload);
                                }
                                break;
                            }

                            case 'content': {
                                hideTyping();
                                accumulatedContent += payload;
                                updateStreamingMessage(accumulatedContent);
                                // Yield al browser per rendering immediato
                                await new Promise(r => requestAnimationFrame(r));
                                break;
                            }

                            case 'tool_start': {
                                hideTyping();
                                const tName = typeof payload === 'string' ? payload : (payload.name || '');
                                const tArgs = typeof payload === 'object' ? (payload.args || '') : '';
                                const toolEl = createToolCallElement(tName, tArgs);
                                toolCallMap[tName] = toolEl;
                                // Yield al browser per mostrare subito la card tool
                                await new Promise(r => requestAnimationFrame(r));
                                break;
                            }

                            case 'tool_end': {
                                const tName = typeof payload === 'object' ? (payload.name || '') : '';
                                const toolEl = toolCallMap[tName];
                                if (toolEl) {
                                    const result = typeof payload === 'object' ? (payload.result || '') : '';
                                    updateToolCallDone(toolEl, result);
                                    delete toolCallMap[tName];
                                    // Yield al browser per aggiornare stato tool
                                    await new Promise(r => requestAnimationFrame(r));
                                }
                                break;
                            }

                            case 'tool_error': {
                                hideTyping();
                                const tName = typeof payload === 'object' ? (payload.name || '') : '';
                                const toolEl = toolCallMap[tName];
                                if (toolEl) {
                                    const errMsg = typeof payload === 'object' ? (payload.error || payload.result || '') : payload;
                                    updateToolCallError(toolEl, errMsg);
                                    delete toolCallMap[tName];
                                    await new Promise(r => requestAnimationFrame(r));
                                }
                                break;
                            }

                            case 'log': {
                                hideTyping();
                                const logText = typeof payload === 'object' ? (payload.text || '') : payload;
                                const logType = typeof payload === 'object' ? (payload.type || 'info') : 'info';
                                appendLogEntry(logText, logType);
                                break;
                            }

                            case 'error': {
                                hideTyping();
                                finalizeStreamingMessage(accumulatedContent || 'Errore durante l\'elaborazione');
                                addErrorMessage(payload);
                                await new Promise(r => requestAnimationFrame(r));
                                break;
                            }

                            case 'done': {
                                hideTyping();
                                finalizeStreamingMessage(accumulatedContent);
                                if (parsed.session_id) {
                                    sessionId = parsed.session_id;
                                }
                                toolActivityContainer = null;
                                await new Promise(r => requestAnimationFrame(r));
                                break;
                            }
                        }
                    } catch (e) {
                        // Ignore parse errors for non-JSON data
                    }
                }
            }

        } catch (err) {
            hideTyping();
            if (err.name === 'AbortError') {
                if (accumulatedContent) {
                    finalizeStreamingMessage(accumulatedContent + '\n\n*[Interrotto]*');
                }
            } else {
                console.error('Stream error:', err);
                addErrorMessage(err.message || 'Errore di comunicazione con il server');
            }
        } finally {
            isStreaming = false;
            sendBtn.innerHTML = '➤';
            sendBtn.classList.remove('stop');
            sendBtn.title = 'Invia (Invio)';
            sendBtn.disabled = false;
            abortController = null;
        }
    }

    // ── Clear conversation ──
    function clearConversation() {
        if (isStreaming) {
            if (abortController) {
                abortController.abort();
            }
            isStreaming = false;
            sendBtn.innerHTML = '➤';
            sendBtn.classList.remove('stop');
            sendBtn.title = 'Invia (Invio)';
            sendBtn.disabled = false;
        }
        messagesEl.innerHTML = '';
        sessionId = null;
        toolActivityContainer = null;
        inputField.focus();
    }

    // ── Check server health ──
    async function checkHealth() {
        try {
            const resp = await fetch('/health', { signal: AbortSignal.timeout(5000) });
            setConnected(resp.ok);
        } catch {
            setConnected(false);
        }
    }

    // ── Event Listeners ──
    sendBtn.addEventListener('click', () => {
        if (isStreaming) {
            if (abortController) {
                abortController.abort();
            }
        } else {
            sendMessage();
        }
    });
    modelToggleBtn.addEventListener('click', cycleModelTier);

    inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
        if (e.key === 'Escape' && isStreaming) {
            if (abortController) {
                abortController.abort();
            }
        }
    });

    clearBtn.addEventListener('click', clearConversation);

    // Health check periodic
    checkHealth();
    setInterval(checkHealth, 30000);

    // Fetch initial model info
    async function fetchModelInfo() {
        try {
            const resp = await fetch('/api/model', { signal: AbortSignal.timeout(5000) });
            if (resp.ok) {
                const data = await resp.json();
                if (data.current) {
                    updateModelBadge(data.current);
                }
            }
        } catch { /* ignore */ }
    }
    fetchModelInfo();

    // Focus input
    inputField.focus();

    // Welcome message
    addMessage('assistant', 'Ciao! Sono **Oracle**, il tuo AI Coding Agent.\n\nChiedimi qualsiasi cosa, dalla scrittura di codice al debugging, al refactoring. Sono qui per aiutarti!');

    // ── Constitution Panel ──
    const constitutionBtn = document.getElementById('constitutionBtn');
    const constitutionOverlay = document.getElementById('constitutionOverlay');
    const constitutionClose = document.getElementById('constitutionClose');

    constitutionBtn.addEventListener('click', () => {
        constitutionOverlay.style.display = 'flex';
        loadConstitutionData();
    });

    constitutionClose.addEventListener('click', () => {
        constitutionOverlay.style.display = 'none';
    });

    constitutionOverlay.addEventListener('click', (e) => {
        if (e.target === constitutionOverlay) {
            constitutionOverlay.style.display = 'none';
        }
    });

    async function loadConstitutionData() {
        await Promise.all([
            loadConstitutionArticles(),
            loadPendingTools(),
            loadAllTools(),
            loadPendingConfirmations()
        ]);
    }

    async function loadConstitutionArticles() {
        try {
            const resp = await fetch('/api/constitution/articles', { signal: AbortSignal.timeout(5000) });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            const container = document.getElementById('constitutionArticles');
            if (!data.articles || data.articles.length === 0) {
                container.innerHTML = '<div class="loading">Nessun articolo trovato.</div>';
                return;
            }
            container.innerHTML = data.articles.map(a =>
                `<div class="constitution-article">
                    <div class="article-num">[${a.id}]</div>
                    <div class="article-text">${escapeHtml(a.text)}</div>
                </div>`
            ).join('');
        } catch (e) {
            document.getElementById('constitutionArticles').innerHTML =
                '<div class="loading">Errore caricamento: ' + e.message + '</div>';
        }
    }

    async function loadPendingTools() {
        try {
            const resp = await fetch('/api/constitution/pending-tools', { signal: AbortSignal.timeout(5000) });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            const container = document.getElementById('pendingToolsList');
            if (!data.pending || data.pending.length === 0) {
                container.innerHTML = '<div class="loading">Nessun tool in attesa.</div>';
                return;
            }
            container.innerHTML = data.pending.map(t =>
                `<div class="tool-item">
                    <span class="tool-name">${escapeHtml(t.name)}</span>
                    <span class="tool-status pending">${t.status}</span>
                    <div class="tool-actions">
                        <button class="btn-approve" onclick="approveTool('${t.id}')">Approvato</button>
                        <button class="btn-reject" onclick="rejectTool('${t.id}')">Rifiutato</button>
                    </div>
                    ${t.description ? '<div class="tool-desc">' + escapeHtml(t.description) + '</div>' : ''}
                </div>`
            ).join('');
        } catch (e) {
            document.getElementById('pendingToolsList').innerHTML =
                '<div class="loading">Errore caricamento: ' + e.message + '</div>';
        }
    }

    async function loadAllTools() {
        try {
            const resp = await fetch('/api/constitution/all-tools', { signal: AbortSignal.timeout(5000) });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            const container = document.getElementById('approvedToolsList');
            if (!data.tools || data.tools.length === 0) {
                container.innerHTML = '<div class="loading">Nessun tool registrato.</div>';
                return;
            }
            // Show only approved + rejected
            const filtered = data.tools.filter(t => t.status !== 'pending');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">Nessun tool approvato o rifiutato.</div>';
                return;
            }
            container.innerHTML = filtered.map(t =>
                `<div class="tool-item">
                    <span class="tool-name">${escapeHtml(t.name)}</span>
                    <span class="tool-status ${t.status}">${t.status}</span>
                    ${t.description ? '<div class="tool-desc">' + escapeHtml(t.description) + '</div>' : ''}
                </div>`
            ).join('');
        } catch (e) {
            document.getElementById('approvedToolsList').innerHTML =
                '<div class="loading">Errore caricamento: ' + e.message + '</div>';
        }
    }

    async function loadPendingConfirmations() {
        try {
            const resp = await fetch('/api/constitution/pending-confirmations', { signal: AbortSignal.timeout(5000) });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            const container = document.getElementById('pendingConfirmationsList');
            if (!data.confirmations || data.confirmations.length === 0) {
                container.innerHTML = '<div class="loading">Nessuna conferma in sospeso.</div>';
                return;
            }
            container.innerHTML = data.confirmations.map(c =>
                `<div class="confirmation-item">
                    <strong>${escapeHtml(c.action_type)}</strong>: ${escapeHtml(c.description)}
                    ${c.target_path ? '<br><small>Target: ' + escapeHtml(c.target_path) + '</small>' : ''}
                </div>`
            ).join('');
        } catch (e) {
            document.getElementById('pendingConfirmationsList').innerHTML =
                '<div class="loading">Errore caricamento: ' + e.message + '</div>';
        }
    }

    // Expose approve/reject functions globally
    window.approveTool = async function(toolId) {
        try {
            const resp = await fetch('/api/constitution/approve-tool', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ tool_id: toolId }),
                signal: AbortSignal.timeout(5000)
            });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            await loadConstitutionData();
        } catch (e) {
            console.error('Approve error:', e);
        }
    };

    window.rejectTool = async function(toolId) {
        try {
            const resp = await fetch('/api/constitution/reject-tool', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ tool_id: toolId }),
                signal: AbortSignal.timeout(5000)
            });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            await loadConstitutionData();
        } catch (e) {
            console.error('Reject error:', e);
        }
    };

})();
</script>
</body>
</html>
